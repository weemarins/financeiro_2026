version: '3.8'

services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: financeiro-backend
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_PATH=/app/data/financeiro.db
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGIN=http://localhost:5173,http://127.0.0.1:5173
    volumes:
      - financeiro-data:/app/data
    networks:
      - financeiro-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: financeiro-frontend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      - VITE_API_URL=http://localhost:${BACKEND_PORT:-5000}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - financeiro-network

volumes:
  financeiro-data:
    driver: local

networks:
  financeiro-network:
    driver: bridge
